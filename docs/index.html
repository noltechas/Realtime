<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050508">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Realtime Karaoke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Patrick+Hand&family=Kalam:wght@700&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&family=Permanent+Marker&family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Chicle&family=Spicy+Rice&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050508;
  --surface-1: rgba(255,255,255,0.03);
  --surface-2: rgba(255,255,255,0.06);
  --surface-3: rgba(255,255,255,0.09);
  --white: #f4f0fb;
  --white-muted: rgba(244,240,251,0.55);
  --white-faint: rgba(244,240,251,0.3);
  --white-ghost: rgba(255,255,255,0.06);
  --violet: #a78bfa;
  --pink: #f472b6;
  --cyan: #22d3ee;
  --emerald: #34d399;
  --amber: #fbbf24;
  --red: #ef4444;
  --grad-hero: linear-gradient(135deg, #e879f9, #a78bfa, #818cf8);
  --grad-text: linear-gradient(135deg, #f472b6, #a78bfa, #818cf8);
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-body: "DM Sans", system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { background: var(--black); color: var(--white); font-family: var(--font-body); font-size: 16px; overscroll-behavior: contain; }
body { min-height: 100dvh; position: relative; overflow-x: hidden; }
.mesh-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(139,92,246,0.08), transparent),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(236,72,153,0.06), transparent),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(59,130,246,0.04), transparent);
  animation: meshShift 20s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0% { opacity: 0.7; transform: scale(1) rotate(0deg); }
  100% { opacity: 1; transform: scale(1.1) rotate(2deg); }
}
.app { position: relative; z-index: 1; padding-bottom: 80px; }
.screen { animation: screenIn 0.3s cubic-bezier(0.22,1,0.36,1); }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.join-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; padding: 40px 24px; text-align: center;
}
.join-logo {
  font-family: var(--font-display); font-weight: 700; font-size: 14px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--white-muted);
  margin-bottom: 16px;
}
.join-title {
  font-family: var(--font-display); font-weight: 700; font-size: 42px;
  line-height: 1.05; letter-spacing: -1.5px;
  background: var(--grad-hero); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.join-sub { font-size: 15px; color: var(--white-muted); margin-bottom: 40px; }
.join-input {
  width: 100%; max-width: 320px; padding: 16px 24px; font-size: 18px;
  font-family: var(--font-display); font-weight: 500; color: var(--white);
  background: var(--surface-1); border: 1.5px solid var(--white-ghost);
  border-radius: 99px; outline: none; text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.join-input:focus {
  border-color: var(--violet);
  box-shadow: 0 0 0 4px rgba(167,139,250,0.15), 0 8px 32px rgba(0,0,0,0.3);
}
.join-input::placeholder { color: var(--white-faint); }
.join-btn {
  margin-top: 20px; width: 100%; max-width: 320px; padding: 16px 32px;
  font-family: var(--font-display); font-weight: 600; font-size: 16px;
  color: white; background: linear-gradient(135deg, #a78bfa, #818cf8);
  border: none; border-radius: 99px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(139,92,246,0.3);
}
.join-btn:active { transform: scale(0.97); }
.join-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.join-session-code {
  margin-top: 32px; font-family: var(--font-display); font-weight: 700;
  font-size: 20px; letter-spacing: 6px; color: var(--white-faint);
}
.avatar-upload {
  width: 80px; height: 80px; border-radius: 50%; cursor: pointer;
  background: var(--surface-2); border: 2px dashed var(--white-ghost);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px; overflow: hidden; position: relative;
  transition: border-color 0.2s, transform 0.15s;
}
.avatar-upload:active { transform: scale(0.95); }
.avatar-upload.has-image { border-style: solid; border-color: var(--violet); }
.avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
.avatar-upload svg { color: var(--white-faint); }
.avatar-upload-hint {
  font-size: 11px; color: var(--white-faint); margin-bottom: 24px;
  font-family: var(--font-display);
}
.profile-screen { padding: 20px; }
.profile-title {
  font-family: var(--font-display); font-weight: 700; font-size: 28px;
  letter-spacing: -0.5px; margin-bottom: 28px;
  background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.profile-avatar-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
.profile-avatar {
  width: 100px; height: 100px; border-radius: 50%; cursor: pointer;
  background: var(--surface-2); border: 2.5px dashed var(--white-ghost);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative; transition: border-color 0.2s, transform 0.15s;
}
.profile-avatar:active { transform: scale(0.95); }
.profile-avatar.has-image { border-style: solid; border-color: var(--violet); }
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-avatar-label {
  margin-top: 10px; font-size: 12px; color: var(--white-faint);
  font-family: var(--font-display); font-weight: 500;
}
.profile-field { margin-bottom: 20px; }
.profile-field-label {
  display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  color: var(--white-muted); margin-bottom: 8px; text-transform: uppercase;
}
.profile-name-input {
  width: 100%; padding: 14px 16px; font-size: 16px; font-family: var(--font-body);
  background: var(--surface-1); border: 1.5px solid var(--white-ghost);
  border-radius: 12px; color: var(--white); outline: none;
  transition: border-color 0.2s;
}
.profile-name-input:focus { border-color: var(--violet); }
.profile-save-btn {
  width: 100%; padding: 16px 32px; margin-top: 8px;
  font-family: var(--font-display); font-weight: 600; font-size: 16px;
  color: white; background: linear-gradient(135deg, #a78bfa, #818cf8);
  border: none; border-radius: 16px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(139,92,246,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.profile-save-btn:active { transform: scale(0.97); }
.guest-picker { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px; -webkit-overflow-scrolling: touch; }
.guest-picker::-webkit-scrollbar { display: none; }
.guest-picker-pill {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px 6px 6px;
  background: var(--surface-2); border: 1.5px solid var(--white-ghost);
  border-radius: 99px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-family: var(--font-display); font-weight: 600; font-size: 12px;
  color: var(--white-muted); transition: all 0.2s;
}
.guest-picker-pill:active { transform: scale(0.95); }
.guest-picker-pill.selected { border-color: var(--violet); color: var(--white); background: rgba(167,139,250,0.1); }
.guest-picker-avatar {
  width: 22px; height: 22px; border-radius: 50%; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #000; flex-shrink: 0;
}
.guest-picker-avatar img { width: 100%; height: 100%; object-fit: cover; }
.songs-header {
  padding: 20px 20px 0; position: sticky; top: 0;
  z-index: 10; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  background: rgba(5,5,8,0.85);
}
.songs-title {
  font-family: var(--font-display); font-weight: 700; font-size: 28px;
  letter-spacing: -0.5px; margin-bottom: 14px;
  background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.search-bar { position: relative; margin-bottom: 16px; }
.search-bar svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--white-muted); pointer-events: none;
}
.search-input {
  width: 100%; padding: 14px 16px 14px 48px; font-size: 16px;
  font-family: var(--font-body); color: var(--white);
  background: var(--surface-1); border: 1.5px solid var(--white-ghost);
  border-radius: 16px; outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--violet); }
.search-input::placeholder { color: var(--white-faint); }
.song-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  padding: 0 20px 20px;
}
.song-card {
  background: var(--surface-1); border: 1px solid var(--white-ghost);
  border-radius: 14px; overflow: hidden; cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  -webkit-user-select: none; user-select: none;
}
.song-card:active { transform: scale(0.97); border-color: rgba(167,139,250,0.4); }
.song-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.song-card-placeholder {
  width: 100%; aspect-ratio: 1; background: var(--surface-2);
  display: flex; align-items: center; justify-content: center; font-size: 40px;
}
.song-card-info { padding: 10px 12px; }
.song-card-title {
  font-family: var(--font-display); font-weight: 600; font-size: 13px;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.song-card-artist {
  font-size: 11px; color: var(--white-muted); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.song-card-dur {
  font-size: 10px; color: var(--white-faint); margin-top: 3px;
  font-family: var(--font-display); font-weight: 500;
}
.song-empty {
  grid-column: 1 / -1; padding: 60px 20px; text-align: center;
  color: var(--white-muted); font-size: 14px;
}
.config-screen { padding: 20px; }
.config-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-display); font-weight: 600; font-size: 13px;
  color: var(--white-muted); background: none; border: none; cursor: pointer;
  padding: 8px 0; margin-bottom: 16px;
}
.config-back:active { color: var(--white); }
.config-song { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
.config-song img {
  width: 72px; height: 72px; border-radius: 14px; object-fit: cover;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.config-song-title {
  font-family: var(--font-display); font-weight: 700; font-size: 22px;
  line-height: 1.2; letter-spacing: -0.3px;
}
.config-song-artist { font-size: 14px; color: var(--white-muted); margin-top: 2px; }
.config-section {
  background: var(--surface-1); border: 1px solid var(--white-ghost);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
}
.config-label {
  font-family: var(--font-display); font-weight: 600; font-size: 14px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.config-label-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.singer-count-btns { display: flex; gap: 6px; }
.singer-count-btn {
  flex: 1; padding: 14px 0; font-family: var(--font-display);
  font-weight: 600; font-size: 15px; border-radius: 12px; cursor: pointer;
  border: 1.5px solid var(--white-ghost); background: var(--surface-1);
  color: var(--white-muted); transition: all 0.2s;
}
.singer-count-btn.active {
  background: rgba(167,139,250,0.12); border-color: var(--violet); color: var(--white);
}
.singer-count-btn:active { transform: scale(0.96); }
.singer-card {
  background: var(--surface-1); border-radius: 16px;
  padding: 20px; margin-bottom: 12px; position: relative; overflow: hidden;
}
.singer-card-accent { position: absolute; top: 0; left: 0; width: 4px; bottom: 0; }
.singer-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.singer-card-dot { width: 8px; height: 8px; border-radius: 50%; }
.singer-card-label { font-family: var(--font-display); font-weight: 600; font-size: 14px; }
.singer-name-input {
  width: 100%; padding: 14px 16px; font-size: 16px; font-family: var(--font-body);
  background: var(--surface-2); border: 1.5px solid var(--surface-3);
  border-radius: 12px; color: var(--white); outline: none;
  transition: border-color 0.2s; margin-bottom: 6px;
}
.singer-name-input:focus { border-color: var(--violet); }
.field-label {
  display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  color: var(--white-muted); margin-bottom: 8px; text-transform: uppercase;
}
.color-dots { display: flex; gap: 12px; flex-wrap: wrap; padding: 4px 0; }
.color-dot {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  border: none;
}
.color-dot.active { transform: scale(1.15); }
.color-dot:active { transform: scale(0.9); }
.role-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.role-btn {
  padding: 12px 16px; font-size: 14px; border-radius: 12px; cursor: pointer;
  border: 1.5px solid var(--surface-3); background: var(--surface-2);
  color: var(--white-muted); font-family: var(--font-body);
  transition: all 0.2s; white-space: nowrap;
}
.role-btn.active {
  background: rgba(167,139,250,0.12); border-color: var(--violet); color: var(--white);
}
.role-btn:active { transform: scale(0.96); }
.add-queue-btn {
  width: 100%; padding: 18px 32px; margin-top: 8px;
  font-family: var(--font-display); font-weight: 600; font-size: 16px;
  color: white; background: linear-gradient(135deg, #a78bfa, #818cf8);
  border: none; border-radius: 16px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(139,92,246,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.add-queue-btn:active { transform: scale(0.97); }
.queue-screen { padding: 20px 20px 20px; }
.queue-title {
  font-family: var(--font-display); font-weight: 700; font-size: 28px;
  letter-spacing: -0.5px; margin-bottom: 20px;
  background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.now-playing-card {
  background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(129,140,248,0.05));
  border: 1px solid rgba(167,139,250,0.2); border-radius: 18px;
  padding: 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 14px;
  animation: nowPlayingPulse 3s ease-in-out infinite alternate;
}
@keyframes nowPlayingPulse {
  0% { box-shadow: 0 0 0 0 rgba(167,139,250,0.1); }
  100% { box-shadow: 0 0 30px 4px rgba(167,139,250,0.08); }
}
.now-playing-card img {
  width: 56px; height: 56px; border-radius: 12px; object-fit: cover;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.now-playing-badge {
  font-family: var(--font-display); font-weight: 700; font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--violet);
  margin-bottom: 4px;
}
.now-playing-title {
  font-family: var(--font-display); font-weight: 600; font-size: 15px;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.now-playing-artist {
  font-size: 12px; color: var(--white-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.queue-section-label {
  font-family: var(--font-display); font-weight: 600; font-size: 12px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--white-faint);
  margin-bottom: 12px;
}
.queue-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--surface-1); border: 1px solid var(--white-ghost);
  border-radius: 14px; margin-bottom: 8px;
}
.queue-pos {
  font-family: var(--font-display); font-weight: 700; font-size: 15px;
  color: var(--white-faint); min-width: 24px; text-align: center;
}
.queue-item img {
  width: 44px; height: 44px; border-radius: 10px; object-fit: cover;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex-shrink: 0;
}
.queue-item-info { flex: 1; min-width: 0; }
.queue-item-title {
  font-family: var(--font-display); font-weight: 600; font-size: 13px;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.queue-item-artist {
  font-size: 11px; color: var(--white-muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.queue-item-added {
  font-size: 10px; color: var(--pink); font-family: var(--font-display);
  font-weight: 500; margin-top: 2px;
}
.queue-item-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.queue-singers-badge {
  display: flex; align-items: center; gap: 3px;
  padding: 3px 8px; background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.2); border-radius: 99px;
  font-size: 10px; font-family: var(--font-display); font-weight: 600; color: var(--violet);
}
.queue-singer-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.queue-singer-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px 2px 2px; border-radius: 99px; font-size: 10px;
  font-family: var(--font-display); font-weight: 600; color: var(--white);
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
}
.queue-singer-dot {
  width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 8px; font-weight: 700; color: #000; overflow: hidden;
}
.queue-singer-dot img { width: 100%; height: 100%; object-fit: cover; }
.queue-singer-role { font-size: 9px; color: var(--white-muted); font-weight: 400; }
.theme-picker { margin-top: 16px; margin-bottom: 8px; }
.theme-picker-label {
  font-family: var(--font-display); font-weight: 600; font-size: 14px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  color: var(--white);
}
.theme-picker-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.theme-pick-btn {
  padding: 14px 12px; cursor: pointer; text-align: center;
  font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
  transition: transform 0.15s, box-shadow 0.15s; position: relative;
}
.theme-pick-btn:active { transform: scale(0.96); }
.theme-pick-btn.selected::after {
  content: "\2713"; position: absolute; top: 6px; right: 8px;
  font-size: 14px; font-weight: 900;
}
.queue-empty {
  text-align: center; padding: 60px 20px; color: var(--white-faint); font-size: 14px;
}
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center; gap: 0;
  padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
  background: rgba(5,5,8,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--white-ghost);
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer; padding: 8px 0;
  color: var(--white-faint); transition: color 0.2s;
  font-family: var(--font-display); font-weight: 600; font-size: 11px;
}
.nav-tab.active { color: var(--violet); }
.nav-tab svg { width: 22px; height: 22px; }
.nav-guest-pill {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 6px 14px 6px 6px; background: var(--surface-2); border-radius: 99px;
  font-family: var(--font-display); font-weight: 600; font-size: 11px;
  color: var(--white-muted); max-width: 140px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; border: none;
  transition: border-color 0.2s;
}
.nav-guest-pill:active { opacity: 0.7; }
.nav-guest-avatar {

function resizeImage(file,maxSize,quality,cb){
  var reader=new FileReader();

    var img=new Image();
    img.onload=function(){

      c.width=maxSize;c.height=maxSize;
      var ctx=c.getContext("2d");
      var sz=Math.min(img.width,img.height);

      ctx.drawImage(img,sx,sy,sz,sz,0,0,maxSize,maxSize);

  };
  reader.readAsDataURL(file);

function render(){
  var a=document.getElementById("app");
  // Apply song's stage theme on You're Up screen, restore global theme otherwise
  if(S.screen==="youreup"&&S.nowPlayingStageTheme){
    var saved=S.theme_name;
    S.theme_name=S.nowPlayingStageTheme;
    applyTheme();
    S.theme_name=saved;
  }else{
    applyTheme();
  }
  switch(S.screen){
    case"loading":a.innerHTML='<div class="loading-center"><div class="spinner"></div></div>';break;
    case"join":a.innerHTML=renderJoin();break;
    case"songs":a.innerHTML=renderSongs()+renderBN("songs");break;
    case"config":a.innerHTML=renderConfig()+renderBN("songs");break;
    case"queue":a.innerHTML=renderQueue()+renderBN("queue");break;
    case"stage":a.innerHTML=renderStage()+renderBN("stage")+renderEmojiPicker()+renderTextInput()+renderMemePicker();break;
    case"profile":a.innerHTML=renderProfile()+renderBN("profile");break;
    case"youreup":a.innerHTML=renderYoureUp();break;
    case"error":a.innerHTML=renderError();break;
  }
  bindEvents();
}
function renderJoin(){
  var avInner=S.profilePicture?'<img src="'+S.profilePicture+'" alt="">':'<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>';
  return '<div class="join-screen screen">'+
    '<div class="join-logo">Realtime</div>'+
    '<div class="join-title">Karaoke</div>'+
    '<p class="join-sub">Set up your profile to join</p>'+
    '<div class="avatar-upload'+(S.profilePicture?" has-image":"")+'" id="avatar-upload">'+avInner+'</div>'+
    '<input type="file" id="avatar-input" accept="image/*" style="display:none">'+
    '<div class="avatar-upload-hint">Tap to add a photo (optional)</div>'+
    '<input class="join-input" id="name-input" placeholder="Your name" maxlength="30" autocomplete="off">'+
    '<button class="join-btn" id="join-btn" disabled>Join Session</button>'+
    '<div class="join-session-code">'+esc(S.sessionCode)+'</div>'+
  '</div>';
}
function renderProfile(){
  var avInner=S.profilePicture?'<img src="'+S.profilePicture+'" alt="">':'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>';
  return '<div class="profile-screen screen">'+
    '<div class="profile-title">Your Profile</div>'+

      '<div class="profile-avatar'+(S.profilePicture?" has-image":"")+'" id="profile-avatar">'+avInner+'</div>'+

      '<div class="profile-avatar-label">Tap to change photo</div>'+

function renderSongs(){
  var q=S.searchQuery.toLowerCase();
  var fl=q?S.catalog.filter(function(s){return s.name.toLowerCase().indexOf(q)>=0||s.artist.toLowerCase().indexOf(q)>=0;}):S.catalog;
  var cards="";
  if(fl.length===0&&q){cards='<div class="song-empty">No songs found</div>';}
  else if(fl.length===0){cards='<div class="song-empty">No songs in the catalog yet</div>';}
  else{cards=fl.map(function(s){
    return '<div class="song-card" data-track="'+s.track_id+'">'+
      (s.art_url?'<img src="'+s.art_url+'" alt="" loading="lazy">':'<div class="song-card-placeholder">&#127925;</div>')+
      '<div class="song-card-info">'+
        '<div class="song-card-title">'+esc(s.name)+'</div>'+
        '<div class="song-card-artist">'+esc(s.artist)+'</div>'+
        '<div class="song-card-dur">'+fmtD(s.duration_ms)+'</div>'+
      '</div></div>';
  }).join("");}
  return '<div class="screen">'+
    '<div class="songs-header">'+
      '<div class="songs-title">Songs</div>'+
      '<div class="search-bar">'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+
        '<input class="search-input" id="search-input" placeholder="Search songs or artists..." value="'+esc(S.searchQuery)+'">'+
      '</div>'+
    '</div>'+
    '<div class="song-grid" id="song-grid">'+cards+'</div>'+
  '</div>';
}
function renderConfig(){
  var t=S.selectedTrack;if(!t)return"";
  var roles=t.roles||[];
  var sh="";
  for(var i=0;i<S.singerCount;i++){
    var s=S.singers[i];
    var cd=NC.map(function(nc,ci){
      var act=s.color===nc.c;
      return '<button class="color-dot'+(act?" active":"")+'" data-singer="'+i+'" data-color="'+ci+'" style="background:'+nc.c+(act?";box-shadow:0 0 0 2px var(--black),0 0 0 4px "+nc.c+",0 0 15px "+nc.g:"")+'"></button>';
    }).join("");
    var rh="";
    if(roles.length>0){
      rh='<div class="field-label" style="margin-top:14px">Roles</div><div class="role-btns">'+
        roles.map(function(r,ri){return '<button class="role-btn'+((s.roleIndices||[]).indexOf(ri)>=0?" active":"")+'" data-singer="'+i+'" data-role="'+ri+'">'+esc(r)+'</button>';}).join("")+
      '</div>';
    }
    var gp="";
    if(S.guests.length>0){
      gp='<div class="guest-picker" data-singer="'+i+'">'+S.guests.map(function(g){
        var isSel=s.name===g.name;
        var avBg=g.profilePicture?'<img src="'+g.profilePicture+'" alt="">':esc((g.name||"?").charAt(0).toUpperCase());
        return '<button class="guest-picker-pill'+(isSel?" selected":"")+'" data-singer="'+i+'" data-guest-id="'+g.id+'"><div class="guest-picker-avatar" style="background:'+NC[S.guests.indexOf(g)%NC.length].c+'">'+avBg+'</div>'+esc(g.name)+'</button>';
      }).join("")+'</div>';
    }
    sh+='<div class="singer-card" style="border:1px solid '+s.color+'">'+
      '<div class="singer-card-accent" style="background:'+s.color+'"></div>'+
      '<div class="singer-card-header"><div class="singer-card-dot" style="background:'+s.color+'"></div><div class="singer-card-label">Singer '+(i+1)+'</div></div>'+
      '<div class="field-label">Name</div>'+
      '<input class="singer-name-input" data-singer="'+i+'" value="'+esc(s.name)+'" placeholder="Singer '+(i+1)+'">'+
      gp+
      '<div class="field-label" style="margin-top:10px">Color</div>'+
      '<div class="color-dots">'+cd+'</div>'+
      rh+
    '</div>';
  }
  var scb=[0,1,2,3,4].map(function(n){return '<button class="singer-count-btn'+(S.singerCount===n?" active":"")+'" data-count="'+n+'">'+(!n?"None":n)+'</button>';}).join("");
  return '<div class="config-screen screen">'+
    '<button class="config-back" id="config-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Songs</button>'+
    '<div class="config-song">'+
      (t.art_url?'<img src="'+t.art_url+'" alt="">':"")+
      '<div><div class="config-song-title">'+esc(t.name)+'</div><div class="config-song-artist">'+esc(t.artist)+'</div></div>'+
    '</div>'+
    '<div class="config-section"><div class="config-label"><div class="config-label-icon" style="background:rgba(244,114,182,0.1)">&#127908;</div> How many singers?</div><div class="singer-count-btns">'+scb+'</div></div>'+
    sh+
    '<div class="theme-picker">'+
      '<div class="theme-picker-label"><div class="config-label-icon" style="background:rgba(167,139,250,0.1)">&#127912;</div> Stage Theme</div>'+
      '<div class="theme-picker-grid">'+
        '<button class="theme-pick-btn'+(S.stage_theme==="neo-brutal" || S.stage_theme === null ?" selected":"")+'" data-stage-theme="neo-brutal" style="background:#FFFDF5;color:#1A1A1A;border:3px solid #1A1A1A;border-radius:8px;font-family:\'Space Grotesk\',sans-serif;box-shadow:3px 3px 0 #1A1A1A;">Default</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="cyberpunk"?" selected":"")+'" data-stage-theme="cyberpunk" style="background:#0a0a1a;color:#00ff88;border:1.5px solid #00ff88;border-radius:0;font-family:\'Courier New\',monospace;text-shadow:0 0 8px rgba(0,255,136,0.5);">Cyberpunk</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="sketch"?" selected":"")+'" data-stage-theme="sketch" style="background:#fdfbf7;color:#2d5da1;border:2px dashed #2d5da1;border-radius:255px 15px 225px 15px / 15px 225px 15px 255px;font-family:\'Patrick Hand\',cursive;">Sketch</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="urban"?" selected":"")+'" data-stage-theme="urban" style="background:#0a0a0a;color:#D4FF00;border:1.5px solid #D4FF00;border-radius:4px;font-family:\'Oswald\',sans-serif;text-transform:uppercase;letter-spacing:2px;">Urban</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="deep-sea"?" selected":"")+'" data-stage-theme="deep-sea" style="background:#040918;color:#00ffc8;border:1px solid rgba(0,255,200,0.4);border-radius:12px;font-family:\'Quicksand\',sans-serif;text-shadow:0 0 8px rgba(0,255,200,0.4);">Deep Sea</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="psychedelic"?" selected":"")+'" data-stage-theme="psychedelic" style="background:#1a0a2e;color:#ff2d95;border:1px solid rgba(255,45,149,0.4);border-radius:16px;font-family:\'Chicle\',cursive;text-shadow:0 0 8px rgba(255,45,149,0.4);">Psychedelic</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="zen"?" selected":"")+'" data-stage-theme="zen" style="background:#1a1814;color:#D4B85A;border:1px solid rgba(201,168,76,0.4);border-radius:6px;font-family:\'Cormorant Garamond\',serif;font-style:italic;text-shadow:0 0 8px rgba(201,168,76,0.3);">Zen</button>'+
        '<button class="theme-pick-btn'+(S.stage_theme==="space"?" selected":"")+'" data-stage-theme="space" style="background:#08080F;color:#E040FB;border:1px solid rgba(224,64,251,0.4);border-radius:4px;font-family:\'Orbitron\',sans-serif;text-shadow:0 0 8px rgba(224,64,251,0.4);letter-spacing:1px;font-size:11px;">Space</button>'+
      '</div>'+
    '</div>'+
    '<button class="add-queue-btn" id="add-queue-btn">Add to Queue</button>'+
  '</div>';
}
function renderQueue(){
  var npH="";
  if(S.nowPlaying){var np=S.nowPlaying;npH='<div class="now-playing-card">'+(np.artUrl?'<img src="'+np.artUrl+'" alt="">':"")+'<div style="flex:1;min-width:0"><div class="now-playing-badge">Now Playing</div><div class="now-playing-title">'+esc(np.name)+'</div><div class="now-playing-artist">'+esc(np.artist||"")+'</div></div></div>';}
  var ih="";
  if(S.queue.length===0){ih='<div class="queue-empty">Queue is empty. Add some songs!</div>';}
  else{ih=S.queue.map(function(q,i){
    var cs=q.singer_configs||[];
    var cat=S.catalog.find(function(c){return c.track_id===q.track_id;});
    var roles=cat&&cat.roles?cat.roles:[];
    var singerPills="";
    if(cs.length>0){
      singerPills='<div class="queue-singer-pills">'+cs.map(function(s){
        var rn=[];
        if(s.roleIndices&&roles.length>0){s.roleIndices.forEach(function(ri){if(roles[ri])rn.push(roles[ri]);});}
        var dotContent=s.profilePicture?'<img src="'+s.profilePicture+'" alt="">':esc((s.name||"?").charAt(0).toUpperCase());
        return '<div class="queue-singer-pill"><div class="queue-singer-dot" style="background:'+s.color+'">'+dotContent+'</div>'+esc(s.name||"Singer")+(rn.length>0?'<span class="queue-singer-role"> \u00B7 '+esc(rn.join(", "))+'</span>':"")+'</div>';
      }).join("")+'</div>';
    }
    return '<div class="queue-item"><div class="queue-pos">'+(i+1)+'</div>'+
      (q.track_art_url?'<img src="'+q.track_art_url+'" alt="">':"")+
      '<div class="queue-item-info"><div class="queue-item-title">'+esc(q.track_name)+'</div><div class="queue-item-artist">'+esc(q.track_artist)+'</div>'+
      (q.added_by_name?'<div class="queue-item-added">Added by '+esc(q.added_by_name)+'</div>':"")+
      singerPills+
    '</div></div>';
  }).join("");}
  return '<div class="queue-screen screen"><div class="queue-title">Queue</div>'+npH+
    '<div class="queue-section-label">Up Next \u00B7 '+S.queue.length+' song'+(S.queue.length!==1?"s":"")+'</div>'+ih+'</div>';
}

      '<div class="reaction-cell" id="react-meme"><div class="reaction-cell-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div><span class="reaction-cell-label">Memes</span></div>'+
      '<div class="reaction-cell" id="react-camera"><div class="reaction-cell-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div><span class="reaction-cell-label">Photo</span></div>'+
    '</div>'+
    '<input type="file" id="react-camera-input" accept="image/*" style="display:none">'+

    (ms?'<div class="youreup-singer-label" style="color:'+singerColor+'">Singing as '+esc(ms.name)+'</div>':'')+

function renderError(){
  return '<div class="error-screen screen"><div class="error-icon">&#128542;</div><div class="error-title">Session Unavailable</div><div class="error-sub">'+esc(S.errorMessage)+'</div></div>';
}
function bindEvents(){
  var ni=document.getElementById("name-input"),jb=document.getElementById("join-btn");
  if(ni&&jb){
    ni.addEventListener("input",function(){jb.disabled=!ni.value.trim();});
    jb.addEventListener("click",function(){joinSession(ni.value);});
    ni.addEventListener("keydown",function(e){if(e.key==="Enter"&&ni.value.trim())joinSession(ni.value);});
    ni.focus();
  }
  var au=document.getElementById("avatar-upload"),ai=document.getElementById("avatar-input");
  if(au&&ai){
    au.addEventListener("click",function(){ai.click();});
    ai.addEventListener("change",function(){
      if(ai.files&&ai.files[0]){resizeImage(ai.files[0],128,0.8,function(url){S.profilePicture=url;render();});}
    });
  }
  var pa=document.getElementById("profile-avatar"),pai=document.getElementById("profile-avatar-input");
  if(pa&&pai){
    pa.addEventListener("click",function(){pai.click();});
    pai.addEventListener("change",function(){
      if(pai.files&&pai.files[0]){resizeImage(pai.files[0],128,0.8,function(url){S.profilePicture=url;render();});}
    });
  }
  var ps=document.getElementById("profile-save"),pn=document.getElementById("profile-name");
  if(ps&&pn){
    ps.addEventListener("click",function(){if(pn.value.trim())updateProfile(pn.value,S.profilePicture);});
  }
  var np2=document.getElementById("nav-profile");
  if(np2){np2.addEventListener("click",function(){S.screen="profile";render();});}
  var si=document.getElementById("search-input");
  if(si){si.addEventListener("input",function(){S.searchQuery=si.value;render();});}
  document.querySelectorAll(".song-card").forEach(function(card){
    card.addEventListener("click",function(){
      var tid=card.dataset.track;
      S.selectedTrack=S.catalog.find(function(s){return s.track_id===tid;});
      if(S.selectedTrack){S.singerCount=1;S.singers=[{name:S.guestName,color:NC[0].c,colorGlow:NC[0].g,roleIndices:[],profilePicture:S.profilePicture}];S.screen="config";render();}
    });
  });
  var cb=document.getElementById("config-back");
  if(cb)cb.addEventListener("click",function(){S.screen="songs";render();});
  document.querySelectorAll(".singer-count-btn").forEach(function(b){
    b.addEventListener("click",function(){setSC(parseInt(b.dataset.count));});
  });
  document.querySelectorAll(".singer-name-input").forEach(function(inp){
    inp.addEventListener("input",function(){var si2=parseInt(inp.dataset.singer);S.singers[si2].name=inp.value;S.singers[si2].profilePicture=null;});
  });
  document.querySelectorAll(".color-dot").forEach(function(dot){
    dot.addEventListener("click",function(){
      var i=parseInt(dot.dataset.singer),ci=parseInt(dot.dataset.color);
      S.singers[i].color=NC[ci].c;S.singers[i].colorGlow=NC[ci].g;render();
    });
  });
  document.querySelectorAll(".role-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var si2=parseInt(btn.dataset.singer),ri=parseInt(btn.dataset.role);
      var idx=S.singers[si2].roleIndices||[];
      if(idx.indexOf(ri)>=0){S.singers[si2].roleIndices=idx.filter(function(x){return x!==ri;});}
      else{S.singers[si2].roleIndices=idx.concat([ri]);}
      render();
    });
  });
  document.querySelectorAll(".guest-picker-pill").forEach(function(pill){
    pill.addEventListener("click",function(){
      var si2=parseInt(pill.dataset.singer);
      var gid=pill.dataset.guestId;
      var guest=S.guests.find(function(g){return g.id===gid;});
      if(guest){
        S.singers[si2].name=guest.name;
        S.singers[si2].profilePicture=guest.profilePicture||null;
        render();
      }
    });
  });
  document.querySelectorAll(".theme-pick-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var v=btn.dataset.stageTheme;
      S.stage_theme=(v==="none"?null:v);
      render();
    });
  });
  var ab=document.getElementById("add-queue-btn");
  if(ab)ab.addEventListener("click",addToQueue);
  // Stage reaction buttons
  var rc=document.getElementById("react-clap");
  if(rc)rc.addEventListener("click",function(){sendReaction("emoji","\uD83D\uDC4F");});
  var rtd=document.getElementById("react-thumbsdown");
  if(rtd)rtd.addEventListener("click",function(){sendReaction("emoji","\uD83D\uDC4E");});
  var rcu=document.getElementById("react-custom");
  if(rcu)rcu.addEventListener("click",function(e){if(e.target.closest("#react-custom-edit")){S.emojiPickerOpen=true;render();return;}sendReaction("emoji",S.customEmoji);});
  var rcup=document.getElementById("react-custom-pick");
  if(rcup)rcup.addEventListener("click",function(){S.emojiPickerOpen=true;render();});
  var rsay=document.getElementById("react-say");
  if(rsay)rsay.addEventListener("click",function(){S.textInputOpen=true;render();setTimeout(function(){var ti=document.getElementById("text-reaction-input");if(ti)ti.focus();},100);});
  var rmeme=document.getElementById("react-meme");
  if(rmeme)rmeme.addEventListener("click",function(){S.memePickerOpen=true;render();});
  var rcam=document.getElementById("react-camera");
  var rcami=document.getElementById("react-camera-input");
  if(rcam&&rcami){
    rcam.addEventListener("click",function(){rcami.click();});
    rcami.addEventListener("change",function(){
      if(rcami.files&&rcami.files[0]){
        resizeImage(rcami.files[0],200,0.7,function(url){sendReaction("photo",url);});
        rcami.value="";
      }
    });
  }
  // Emoji picker overlay
  var eov=document.getElementById("emoji-overlay");
  if(eov){
    eov.addEventListener("click",function(e){if(e.target===eov){S.emojiPickerOpen=false;render();}});
    document.querySelectorAll(".emoji-pick-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        S.customEmoji=btn.dataset.emoji;
        S.emojiPickerOpen=false;
        render();
      });
    });
  }
  // Text input overlay
  var tov=document.getElementById("text-overlay");
  if(tov){
    tov.addEventListener("click",function(e){if(e.target===tov){S.textInputOpen=false;render();}});
    var tsend=document.getElementById("text-reaction-send");
    var tinp=document.getElementById("text-reaction-input");
    if(tsend&&tinp){
      tsend.addEventListener("click",function(){var v=tinp.value.trim();if(v){sendReaction("text",v);S.textInputOpen=false;render();}});
      tinp.addEventListener("keydown",function(e){if(e.key==="Enter"){var v=tinp.value.trim();if(v){sendReaction("text",v);S.textInputOpen=false;render();}}});
    }
  }
  // Meme picker overlay
  var mov=document.getElementById("meme-overlay");
  if(mov){
    mov.addEventListener("click",function(e){if(e.target===mov){S.memePickerOpen=false;render();}});
    document.querySelectorAll(".meme-pick-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        sendReaction("emoji",btn.dataset.memeEmoji);
        S.memePickerOpen=false;
        render();
      });
    });
  }
  var yupBtn=document.getElementById("youreup-play-btn");
  if(yupBtn){
    yupBtn.addEventListener("click",function(){
      var newState=!S.isPlaying;
      sb.from("karaoke_sessions")
        .update({is_playing:newState,updated_at:new Date().toISOString()})
        .eq("id",S.sessionId)
        .then(function(res){
          if(res.error)console.error("Failed to toggle play:",res.error);
        });
    });
  }
  document.querySelectorAll(".nav-tab").forEach(function(tab){
    tab.addEventListener("click",function(){
      S.screen=tab.dataset.nav;
      if(tab.dataset.nav==="queue")loadQueue().then(render);else render();
    });
  });
}
init();
})();
</script>
</body>
</html>
